<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk to Sofia — Growth-onomics</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070f;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --white: #f0f0ff;
    --gray: #6c6c84;
    --red: #e17055;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    overflow: hidden;
  }

  /* BACKGROUND GLOW */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,92,231,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* BRAND */
  .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 48px;
  }
  .brand span { color: var(--accent2); }

  /* SOFIA AVATAR */
  .avatar-wrap {
    position: relative;
    margin-bottom: 32px;
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3d3580, #6c5ce7, #a29bfe);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    position: relative;
    z-index: 2;
    box-shadow: 0 0 0 8px rgba(108,92,231,0.08), 0 0 60px rgba(108,92,231,0.25);
    transition: box-shadow 0.4s ease;
  }
  .avatar.speaking {
    box-shadow: 0 0 0 8px rgba(108,92,231,0.15), 0 0 80px rgba(108,92,231,0.5);
    animation: pulse-glow 1.5s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 8px rgba(108,92,231,0.15), 0 0 60px rgba(108,92,231,0.3); }
    50% { box-shadow: 0 0 0 16px rgba(108,92,231,0.08), 0 0 100px rgba(108,92,231,0.5); }
  }

  /* ONLINE DOT */
  .online-dot {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 18px; height: 18px;
    background: var(--green);
    border-radius: 50%;
    border: 3px solid var(--bg);
    z-index: 3;
    transition: background 0.3s;
  }
  .online-dot.active { background: var(--green); }
  .online-dot.busy { background: var(--accent2); animation: blink 1s infinite; }
  .online-dot.ended { background: var(--gray); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SOFIA INFO */
  .sofia-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-align: center;
  }
  .sofia-role {
    font-size: 14px;
    color: var(--gray);
    text-align: center;
    margin-bottom: 40px;
  }
  .sofia-role span {
    color: var(--accent2);
    font-weight: 500;
  }

  /* WAVE */
  .wave-wrap {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-bottom: 40px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .wave-wrap.visible { opacity: 1; }
  .wave-bar {
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(to top, var(--accent), var(--accent2));
    animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 24px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 40px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 28px; animation-delay: 0.15s; }
  .wave-bar:nth-child(5) { height: 40px; animation-delay: 0.25s; }
  .wave-bar:nth-child(6) { height: 24px; animation-delay: 0.1s; }
  .wave-bar:nth-child(7) { height: 12px; animation-delay: 0.05s; }
  .wave-bar.idle { animation: none; height: 4px !important; opacity: 0.3; }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  /* STATUS */
  .status-text {
    font-size: 14px;
    color: var(--gray);
    text-align: center;
    height: 20px;
    margin-bottom: 40px;
    transition: color 0.3s;
  }
  .status-text.active { color: var(--accent2); }

  /* TIMER */
  .timer {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .timer.visible { opacity: 1; }

  /* BUTTONS */
  .btn-start {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 16px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    box-shadow: 0 8px 32px rgba(108,92,231,0.3);
    margin-bottom: 16px;
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(108,92,231,0.45); }
  .btn-start:active { transform: translateY(0); }
  .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-end {
    width: 100%;
    padding: 16px;
    background: rgba(225,112,85,0.1);
    border: 1px solid rgba(225,112,85,0.3);
    border-radius: 16px;
    color: var(--red);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .btn-end:hover { background: rgba(225,112,85,0.2); }
  .btn-end.show { display: flex; }

  /* TAGLINE */
  .tagline {
    margin-top: 32px;
    font-size: 12px;
    color: rgba(255,255,255,0.15);
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* ERROR TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(225,112,85,0.15);
    border: 1px solid rgba(225,112,85,0.3);
    color: var(--red);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    transition: transform 0.3s;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .avatar { width: 100px; height: 100px; font-size: 44px; }
    .sofia-name { font-size: 24px; }
    .btn-start, .btn-end { padding: 16px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="brand">Growth<span>-onomics</span></div>

  <div class="avatar-wrap">
    <div class="avatar" id="avatar">👩‍💼</div>
    <div class="online-dot active" id="dot"></div>
  </div>

  <div class="sofia-name">Sofia</div>
  <div class="sofia-role">Business Development · <span>Growth-onomics</span></div>

  <div class="wave-wrap" id="wave">
    <div class="wave-bar idle" id="wb1"></div>
    <div class="wave-bar idle" id="wb2"></div>
    <div class="wave-bar idle" id="wb3"></div>
    <div class="wave-bar idle" id="wb4"></div>
    <div class="wave-bar idle" id="wb5"></div>
    <div class="wave-bar idle" id="wb6"></div>
    <div class="wave-bar idle" id="wb7"></div>
  </div>

  <div class="timer" id="timer">00:00</div>
  <div class="status-text" id="status">Available now</div>

  <button class="btn-start" id="btn-start" onclick="startCall()">
    🎙️ &nbsp;Talk to Sofia
  </button>
  <button class="btn-end" id="btn-end" onclick="endCall()">
    📵 &nbsp;End Call
  </button>

  <div class="tagline">Try asking about GEO or fintech growth</div>

</div>

<div class="toast" id="toast"></div>

<!-- SDK -->
<script type="module">
  import Vapi from 'https://esm.sh/@vapi-ai/web';
  window.Vapi = Vapi;
  window.vapiReady = true;
  document.dispatchEvent(new Event('vapi-ready'));
</script>

<script>
const PUBLIC_KEY = '2c3d59d1-22d9-4710-8cf0-cb9917dd0640';

const SOFIA = {
  name: "Sofia",
  firstMessage: "Hey! This is Sofia from Growth-onomics. We help fintech companies grow profitably — I wanted to see if there's a fit. Do you have 2 minutes?",
  model: {
    provider: "openai",
    model: "gpt-4o",
    messages: [{
      role: "system",
      content: `You are Sofia, a sharp business development agent for Growth-onomics — a specialist growth agency exclusively for fintech companies.

Growth-onomics services:
- Paid Acquisition (Meta, Google, programmatic — CAC-positive or you say so upfront)
- GEO — Generative Engine Optimization (getting fintechs found by ChatGPT, Perplexity, Claude — most fintechs are invisible on AI search)
- B2B Demand Gen (pipeline generation for fintech sales teams)
- Growth Strategy & GTM (go-to-market for new fintech products)
- Fractional CMO (senior growth leadership without the full-time cost)

Your edge: "We grow fintechs. Profitably." — revenue-focused, not vanity metrics. We don't just run ads — we engineer growth.

Your goal on this call:
1. Warm, direct opener — you spotted them, they came up on your radar
2. Quick qualify: are they in fintech? Do they have a growth or acquisition problem?
3. Drop the GEO angle — most fintechs are completely invisible on AI search engines, losing leads to competitors who show up in ChatGPT answers
4. Handle objections confidently (budget, "we have an agency already", "not the right time")
5. Close for a 20-minute strategy call with the founder or CMO

Voice style: confident, smart, slightly casual. Sharp, not pushy. Like a peer who spotted an opportunity — not a salesperson reading a script.

If asked who referred you: "We research fintechs that look like they're ready to scale — you came up."
If asked about pricing: "Depends on where you're at — that's what the strategy call figures out. No pitch, just honest assessment."
If asked about GEO specifically: "It's the new SEO. When someone asks ChatGPT or Perplexity 'best fintech for X', does your brand show up? Most don't. That's the gap we fix."

Keep it under 3 minutes. Be human. Never reveal you're an AI unless directly asked.`
    }]
  },
  voice: {
    provider: "11labs",
    voiceId: "21m00Tcm4TlvDq8ikWAM",
    stability: 0.5,
    similarityBoost: 0.8
  },
  recordingEnabled: false
};

let vapi = null;
let timerInterval = null;
let seconds = 0;

function setStatus(text, active = false) {
  const el = document.getElementById('status');
  el.textContent = text;
  el.className = 'status-text' + (active ? ' active' : '');
}

function setWave(speaking) {
  document.getElementById('wave').className = 'wave-wrap' + (speaking ? ' visible' : '');
  for (let i = 1; i <= 7; i++) {
    const bar = document.getElementById(`wb${i}`);
    if (speaking) bar.classList.remove('idle');
    else bar.classList.add('idle');
  }
}

function startTimer() {
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2,'0');
    const s = String(seconds % 60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
  document.getElementById('timer').className = 'timer visible';
}

function stopTimer() {
  clearInterval(timerInterval);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

async function startCall() {
  document.getElementById('btn-start').disabled = true;
  setStatus('Connecting...');

  if (!window.Vapi) {
    setStatus('Loading...');
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => reject(new Error('SDK timeout')), 10000);
      document.addEventListener('vapi-ready', () => { clearTimeout(timeout); resolve(); }, { once: true });
    }).catch(e => { showToast('Failed to load. Try refreshing.'); document.getElementById('btn-start').disabled = false; setStatus('Available now'); return; });
  }

  try {
    vapi = new window.Vapi(PUBLIC_KEY);

    vapi.on('call-start', () => {
      setStatus('Sofia is speaking...', true);
      document.getElementById('btn-start').style.display = 'none';
      document.getElementById('btn-end').classList.add('show');
      document.getElementById('dot').className = 'online-dot busy';
      document.getElementById('avatar').classList.add('speaking');
      setWave(true);
      startTimer();
    });

    vapi.on('speech-start', () => {
      setStatus('Sofia is speaking...', true);
      setWave(true);
      document.getElementById('avatar').classList.add('speaking');
    });

    vapi.on('speech-end', () => {
      setStatus('Listening...', true);
      setWave(false);
      document.getElementById('avatar').classList.remove('speaking');
    });

    vapi.on('call-end', () => {
      stopTimer();
      setWave(false);
      document.getElementById('avatar').classList.remove('speaking');
      document.getElementById('btn-end').classList.remove('show');
      document.getElementById('btn-start').style.display = 'flex';
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-start').innerHTML = '🔄 &nbsp;Talk to Sofia Again';
      document.getElementById('dot').className = 'online-dot active';
      document.getElementById('timer').className = 'timer';
      setStatus('Call ended');
      setTimeout(() => setStatus('Available now'), 3000);
    });

    vapi.on('error', (e) => {
      showToast(e.message || 'Something went wrong');
      document.getElementById('btn-start').disabled = false;
      setStatus('Available now');
    });

    await vapi.start(SOFIA);

  } catch(e) {
    showToast(e.message || 'Failed to start call');
    document.getElementById('btn-start').disabled = false;
    setStatus('Available now');
  }
}

function endCall() {
  if (vapi) vapi.stop();
}
</script>

</body>
</html>
